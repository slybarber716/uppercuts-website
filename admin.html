<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uppercuts Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark: #0A0A0A;
            --surface: #111111;
            --gold: #C9A96E;
            --gold-light: #E8D5B7;
            --text: #FFFFFF;
            --text-muted: #B8B8B8;
            --success: #4CAF50;
            --danger: #E74C3C;
            --warning: #F39C12;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

        /* LOGIN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--surface);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .login-box p { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            background: var(--dark);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
        }
        .login-box input:focus { outline: none; border-color: var(--gold); }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-box button:hover { background: var(--gold-light); }
        .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

        /* ADMIN PANEL */
        .admin-panel { display: none; }
        .admin-nav {
            background: var(--surface);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--gold);
        }
        .admin-nav h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 3px; }
        .admin-nav button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .admin-nav button:hover { border-color: var(--gold); color: var(--gold); }

        .admin-content { padding: 32px; max-width: 1200px; margin: 0 auto; }

        .tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab {
            padding: 12px 24px;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card {
            background: var(--surface);
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-card .num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--gold); }
        .stat-card .lbl { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

        /* TABLE */
        .table-wrap { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid rgba(201,169,110,0.15); }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--dark);
            padding: 14px 20px;
            text-align: left;
            font-family: 'Oswald', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
        }
        td { padding: 14px 20px; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); }
        tr:hover td { background: rgba(201,169,110,0.03); }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-new { background: rgba(201,169,110,0.15); color: var(--gold); }
        .badge-monthly { background: rgba(76,175,80,0.15); color: var(--success); }
        .badge-noshow { background: rgba(231,76,60,0.15); color: var(--danger); }
        .badge-late { background: rgba(243,156,18,0.15); color: var(--warning); }
        .badge-regular { background: rgba(255,255,255,0.1); color: var(--text-muted); }

        .action-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            margin-right: 4px;
            transition: all 0.2s;
        }
        .btn-flag-noshow { background: rgba(231,76,60,0.2); color: var(--danger); }
        .btn-flag-noshow:hover { background: var(--danger); color: #fff; }
        .btn-flag-late { background: rgba(243,156,18,0.2); color: var(--warning); }
        .btn-flag-late:hover { background: var(--warning); color: #fff; }
        .btn-clear { background: rgba(76,175,80,0.2); color: var(--success); }
        .btn-clear:hover { background: var(--success); color: #fff; }
        .btn-danger { background: rgba(231,76,60,0.2); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }

        /* CLIENTS TAB */
        .search-bar {
            width: 100%;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
        }
        .search-bar:focus { outline: none; border-color: var(--gold); }

        .add-client-form {
            background: var(--surface);
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .add-client-form input, .add-client-form select {
            padding: 12px 16px;
            background: var(--dark);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .add-client-form input:focus, .add-client-form select:focus { outline: none; border-color: var(--gold); }
        .add-client-form select option { background: var(--dark); }
        .add-client-form label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
        .btn-add {
            padding: 12px 24px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-add:hover { background: var(--gold-light); }

        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); font-size: 15px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>UPPERCUTS</h1>
        <p>Admin Panel — Barber Access Only</p>
        <input type="password" id="adminPass" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">LOGIN</button>
        <p class="login-error" id="loginError">Incorrect password. Try again.</p>
    </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
    <nav class="admin-nav">
        <h1>UPPERCUTS ADMIN</h1>
        <button onclick="logout()">Logout</button>
    </nav>
    <div class="admin-content">

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('bookings', this)">Bookings</button>
            <button class="tab" onclick="switchTab('clients', this)">Clients</button>
        </div>

        <!-- BOOKINGS TAB -->
        <div class="tab-panel active" id="tab-bookings">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Deposit</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable"></tbody>
                </table>
                <div class="empty-state" id="bookingsEmpty" style="display:none;">No bookings yet. They'll show up here when clients book.</div>
            </div>
        </div>

        <!-- CLIENTS TAB -->
        <div class="tab-panel" id="tab-clients">
            <div class="add-client-form">
                <div>
                    <label>Client Name</label>
                    <input type="text" id="newClientName" placeholder="Full name">
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="tel" id="newClientPhone" placeholder="(xxx) xxx-xxxx">
                </div>
                <div>
                    <label>Status</label>
                    <select id="newClientStatus">
                        <option value="regular">Regular</option>
                        <option value="monthly">Monthly Client</option>
                        <option value="noshow">No-Show</option>
                        <option value="late">Late Client</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addClient()">Add Client</button>
            </div>
            <input type="text" class="search-bar" id="clientSearch" placeholder="Search by name or phone..." oninput="renderClients()">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTable"></tbody>
                </table>
                <div class="empty-state" id="clientsEmpty" style="display:none;">No clients yet. They'll be added automatically when someone books.</div>
            </div>
        </div>

    </div>
</div>

<script>
    const PASS = 'AugieDog76';

    function login() {
        const val = document.getElementById('adminPass').value;
        if (val === PASS) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderAll();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPass').value = '';
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        renderAll();
    }

    function getClients() { return JSON.parse(localStorage.getItem('uc_clients') || '{}'); }
    function saveClients(d) { localStorage.setItem('uc_clients', JSON.stringify(d)); }
    function getClientNames() { return JSON.parse(localStorage.getItem('uc_client_names') || '{}'); }
    function saveClientNames(d) { localStorage.setItem('uc_client_names', JSON.stringify(d)); }
    function getBookings() { return JSON.parse(localStorage.getItem('uc_bookings') || '[]'); }
    function saveBookings(d) { localStorage.setItem('uc_bookings', JSON.stringify(d)); }

    function badgeHTML(status) {
        const map = { new: 'badge-new', monthly: 'badge-monthly', noshow: 'badge-noshow', late: 'badge-late', regular: 'badge-regular' };
        const labels = { new: 'New', monthly: 'Monthly', noshow: 'No-Show', late: 'Late', regular: 'Regular' };
        return `<span class="badge ${map[status] || 'badge-regular'}">${labels[status] || status}</span>`;
    }

    function renderAll() {
        renderBookings();
        renderClients();
        renderStats();
    }

    function renderStats() {
        const bookings = getBookings();
        const clients = getClients();
        const noShows = Object.values(clients).filter(s => s === 'noshow').length;
        const monthly = Object.values(clients).filter(s => s === 'monthly').length;
        const depositsOwed = bookings.filter(b => !b.depositPaid && b.depositAmount > 0).length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="num">${bookings.length}</div><div class="lbl">Total Bookings</div></div>
            <div class="stat-card"><div class="num">${monthly}</div><div class="lbl">Monthly Clients</div></div>
            <div class="stat-card"><div class="num" style="color:var(--danger)">${noShows}</div><div class="lbl">No-Shows</div></div>
            <div class="stat-card"><div class="num" style="color:var(--warning)">${depositsOwed}</div><div class="lbl">Deposits Pending</div></div>
        `;
    }

    function renderBookings() {
        const bookings = getBookings().slice().reverse();
        const tbody = document.getElementById('bookingsTable');
        if (bookings.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('bookingsEmpty').style.display = 'block';
            return;
        }
        document.getElementById('bookingsEmpty').style.display = 'none';
        tbody.innerHTML = bookings.map((b, i) => `
            <tr>
                <td style="color:#fff;font-weight:500;">${b.name}</td>
                <td>${b.phone}</td>
                <td>${b.service}</td>
                <td>${b.date}</td>
                <td>${b.time}</td>
                <td>${badgeHTML(b.status)}</td>
                <td>${b.depositAmount > 0 ? (b.depositPaid ? '<span style="color:var(--success)">✅ Paid</span>' : `<span style="color:var(--warning)">⏳ $${b.depositAmount} Owed</span>`) : '<span style="color:var(--text-muted)">—</span>'}</td>
                <td>
                    <button class="action-btn btn-flag-noshow" onclick="flagBookingClient('${b.phone}', 'noshow')">No-Show</button>
                    <button class="action-btn btn-flag-late" onclick="flagBookingClient('${b.phone}', 'late')">Late</button>
                    <button class="action-btn btn-clear" onclick="flagBookingClient('${b.phone}', 'regular')">Clear</button>
                    ${b.depositAmount > 0 && !b.depositPaid ? `<button class="action-btn btn-clear" onclick="markDepositPaid(${b.id})">Mark Paid</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function flagBookingClient(phone, status) {
        const clients = getClients();
        const clean = phone.replace(/\D/g, '');
        clients[clean] = status;
        saveClients(clients);
        renderAll();
    }

    function markDepositPaid(id) {
        const bookings = getBookings();
        const idx = bookings.findIndex(b => b.id === id);
        if (idx > -1) { bookings[idx].depositPaid = true; saveBookings(bookings); }
        renderAll();
    }

    function renderClients() {
        const clients = getClients();
        const names = getClientNames();
        const search = (document.getElementById('clientSearch')?.value || '').toLowerCase();
        const tbody = document.getElementById('clientsTable');
        const entries = Object.entries(clients).filter(([phone, status]) => {
            const name = (names[phone] || '').toLowerCase();
            return !search || phone.includes(search) || name.includes(search);
        });
        if (entries.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('clientsEmpty').style.display = 'block';
            return;
        }
        document.getElementById('clientsEmpty').style.display = 'none';
        tbody.innerHTML = entries.map(([phone, status]) => `
            <tr>
                <td style="color:#fff;font-weight:500;">${names[phone] || '—'}</td>
                <td>${phone}</td>
                <td>${badgeHTML(status)}</td>
                <td>
                    <button class="action-btn btn-flag-noshow" onclick="updateClientStatus('${phone}', 'noshow')">No-Show</button>
                    <button class="action-btn btn-flag-late" onclick="updateClientStatus('${phone}', 'late')">Late</button>
                    <button class="action-btn btn-clear" onclick="updateClientStatus('${phone}', 'regular')">Clear</button>
                    <button class="action-btn btn-clear" onclick="updateClientStatus('${phone}', 'monthly')">Monthly</button>
                    <button class="action-btn btn-danger" onclick="deleteClient('${phone}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function updateClientStatus(phone, status) {
        const clients = getClients();
        clients[phone] = status;
        saveClients(clients);
        renderAll();
    }

    function deleteClient(phone) {
        if (!confirm('Remove this client?')) return;
        const clients = getClients();
        const names = getClientNames();
        delete clients[phone];
        delete names[phone];
        saveClients(clients);
        saveClientNames(names);
        renderAll();
    }

    function addClient() {
        const name = document.getElementById('newClientName').value.trim();
        const phone = document.getElementById('newClientPhone').value.trim().replace(/\D/g, '');
        const status = document.getElementById('newClientStatus').value;
        if (!phone) { alert('Phone number required.'); return; }
        const clients = getClients();
        const names = getClientNames();
        clients[phone] = status;
        if (name) names[phone] = name;
        saveClients(clients);
        saveClientNames(names);
        document.getElementById('newClientName').value = '';
        document.getElementById('newClientPhone').value = '';
        renderAll();
    }
</script>
</body>
</html>
